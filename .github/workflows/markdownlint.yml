name: Markdown Lint

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.yaml"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
            !CHANGELOG.md
            !reports/**
            !notes.md
