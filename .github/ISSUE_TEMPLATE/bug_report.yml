name: Bug Report
description: Report a bug in oss-ops
labels: ["bug"]
body:
  - type: checkboxes
    id: search
    attributes:
      label: Existing issues
      options:
        - label: I searched existing issues and this hasn't been reported yet
          required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
  - type: input
    id: os
    attributes:
      label: OS and Go version
      placeholder: "e.g., macOS 15 / Go 1.24"
  - type: textarea
    id: doctor
    attributes:
      label: Output of oss-ops doctor
      description: Paste the output here (helps diagnose setup issues)
      render: shell
